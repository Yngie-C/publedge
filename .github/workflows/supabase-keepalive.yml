name: Supabase Keep-Alive

# Prevents Supabase free-tier project from pausing due to inactivity.
# Supabase free plan auto-pauses after 1 week of no DB activity.
# This workflow pings the DB every 5 days, well within the 7-day window.

on:
  schedule:
    # Every 5 days at 00:00 UTC
    - cron: '0 0 */5 * *'
  # Allow manual trigger from GitHub Actions UI
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST API
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "apikey: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}" \
            "${{ secrets.SUPABASE_URL }}/rest/v1/")

          echo "HTTP status: $response"

          if [ "$response" != "200" ]; then
            echo "::warning::Unexpected HTTP status $response — keep-alive may have failed"
            exit 1
          fi

          echo "✅ Keep-alive ping successful"
